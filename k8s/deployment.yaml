apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-hello
  namespace: cicd-demo
  labels:
    app: spring-boot-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-boot-hello
  template:
    metadata:
      labels:
        app: spring-boot-hello
    spec:
      containers:
      - name: spring-boot-hello
        image: host.docker.internal:5001/spring-boot-hello:local
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
